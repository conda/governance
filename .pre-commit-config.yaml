# ignore meeting notes since they are synced as is from HackMD
exclude: |
  (?x)^(
    meetings/archive
  )/
# pre-commit.ci has no pixi; linting runs in GitHub Actions via `pixi run lint`
ci:
  skip:
    - pixi-install
    - ruff
    - ruff-format
    - trailing-whitespace-fixer
    - end-of-file-fixer
    - check-merge-conflict
    - mixed-line-ending
    - check-toml
    - check-yaml
    - check-jsonschema
    - check-github-workflows
    - yamlfmt
    - tombi-format
    - tombi-lint
    - codespell
    - zizmor
repos:
  - repo: local
    hooks:
      - id: pixi-install
        name: pixi-install
        entry: pixi install
        language: system
        always_run: true
        require_serial: true
        pass_filenames: false
      # ruff
      - id: ruff
        name: ruff
        entry: pixi run ruff check --fix --exit-non-zero-on-fix --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      - id: ruff-format
        name: ruff-format
        entry: pixi run ruff format --force-exclude
        language: system
        types_or: [python, pyi]
        require_serial: true
      # pre-commit-hooks
      - id: trailing-whitespace-fixer
        name: trailing-whitespace-fixer
        entry: pixi run trailing-whitespace-fixer
        language: system
        types: [text]
      - id: end-of-file-fixer
        name: end-of-file-fixer
        entry: pixi run end-of-file-fixer
        language: system
        types: [text]
      - id: check-merge-conflict
        name: check-merge-conflict
        entry: pixi run check-merge-conflict --assume-in-merge
        language: system
        types: [text]
      - id: mixed-line-ending
        name: mixed-line-ending
        entry: pixi run mixed-line-ending
        language: system
        types: [text]
      - id: check-toml
        name: check-toml
        entry: pixi run check-toml
        language: system
        types: [toml]
      - id: check-yaml
        name: check-yaml
        entry: pixi run check-yaml
        language: system
        types: [yaml]
      # check-jsonschema
      - id: check-jsonschema
        name: check-jsonschema
        entry: pixi run check-jsonschema
        language: system
        files: ^teams/.*\.ya?ml$
        args: [--schemafile, teams/teams.schema.json]
      - id: check-github-workflows
        name: check-github-workflows
        entry: pixi run check-jsonschema --builtin-schema vendor.github-workflows
        language: system
        types: [yaml]
        files: ^\.github/workflows/[^/]+$
      # yamlfmt
      - id: yamlfmt
        name: yamlfmt
        entry: pixi run yamlfmt
        language: system
        types: [yaml]
      # tombi
      - id: tombi-format
        name: tombi-format
        entry: pixi run tombi format
        language: system
        types: [toml]
      - id: tombi-lint
        name: tombi-lint
        entry: pixi run tombi lint
        language: system
        types: [toml]
      # codespell
      - id: codespell
        name: codespell
        entry: pixi run codespell
        language: system
        exclude_types: [csv]
        types: [text]
        args: [--write-changes]
      # zizmor
      - id: zizmor
        name: zizmor
        entry: pixi run zizmor --no-progress --min-severity high --fix .
        language: system
        types: [yaml]
        pass_filenames: false
