name: Steering members
on:
  workflow_dispatch:
  pull_request:
    paths:
      - steering.csv
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@a09b6247153796b190642a2b53fac4241043cf6f # v0.10.0
      - name: Check steering member checklist
        id: check
        run: |
          if pixi run sync_steering_members -- --check; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
            pixi run sync_steering_members
          fi
      - name: Prepare artifact
        if: steps.check.outputs.stale == 'true' && github.event_name == 'pull_request'
        run: |
          mkdir -p steering-sync/.github/ISSUE_TEMPLATE
          git diff --name-only | while read -r f; do
            cp "$f" "steering-sync/$f"
          done
          echo "$PR_NUMBER" > steering-sync/pr_number
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
      - name: Upload artifact
        if: steps.check.outputs.stale == 'true' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: steering-checklist
          path: steering-sync/
          retention-days: 1
      - name: Fail if stale
        if: steps.check.outputs.stale == 'true'
        run: exit 1
