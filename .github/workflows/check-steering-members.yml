name: Steering members
on:
  workflow_dispatch:
  pull_request:
    paths:
      - steering.csv
permissions:
  contents: read
jobs:
  check:
    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: prefix-dev/setup-pixi@1b2de7f3351f171c8b4dfeb558c639cb58ed4ec0 # v0.9.5
      - name: Check steering member checklist
        id: check
        run: |
          if pixi run sync_steering_members -- --check; then
            echo "stale=false" >> "$GITHUB_OUTPUT"
          else
            echo "stale=true" >> "$GITHUB_OUTPUT"
            pixi run sync_steering_members
          fi
      - name: Prepare artifact
        if: steps.check.outputs.stale == 'true' && github.event_name == 'pull_request'
        run: |
          mkdir -p steering-sync/.github/ISSUE_TEMPLATE
          git diff --name-only | while read -r f; do
            cp "$f" "steering-sync/$f"
          done
          echo "$PR_NUMBER" > steering-sync/pr_number
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
      - name: Upload artifact
        if: steps.check.outputs.stale == 'true' && github.event_name == 'pull_request'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: steering-checklist
          path: steering-sync/
          retention-days: 1
      - name: Fail if stale
        if: steps.check.outputs.stale == 'true'
        run: exit 1
